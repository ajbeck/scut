name: Release

on:
  workflow_dispatch:
    inputs:
      releaseVersion:
        description: Version to release, for example 0.2.0 or v0.2.0.
        required: true
        type: string
      targetSha:
        description: Full commit SHA to release. Must match the current HEAD of main.
        required: true
        type: string

permissions:
  contents: write
  actions: read
  pages: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  tag-release:
    name: Tag Release
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.tag.outputs.commit_sha }}
      release_tag: ${{ steps.tag.outputs.release_tag }}
      major_tag: ${{ steps.tag.outputs.major_tag }}
      minor_tag: ${{ steps.tag.outputs.minor_tag }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true

      - name: Create release tags
        id: tag
        env:
          INPUT_VERSION: ${{ inputs.releaseVersion }}
          TARGET_SHA: ${{ inputs.targetSha }}
        run: |
          version="${INPUT_VERSION#v}"
          VERSION="${version}" node <<'NODE'
          const version = process.env.VERSION
          const semverPattern = /^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-((?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*)(?:\.(?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*))*))?(?:\+([0-9a-zA-Z-]+(?:\.[0-9a-zA-Z-]+)*))?$/
          const match = semverPattern.exec(version)
          if (!match) {
            console.error("releaseVersion must be a semantic version like 0.2.0 or v0.2.0")
            process.exit(1)
          }
          if (match[4] || match[5]) {
            console.error("releaseVersion must be stable; prerelease and build metadata are not accepted")
            process.exit(1)
          }
          NODE
          if [[ ! "$TARGET_SHA" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "targetSha must be a full 40-character commit SHA" >&2
            exit 1
          fi

          IFS=. read -r major minor patch <<< "$version"
          release_tag="v${major}.${minor}.${patch}"
          minor_tag="v${major}.${minor}"
          major_tag="v${major}"
          commit_sha="$(git rev-parse "${TARGET_SHA}^{commit}")"
          main_sha="$(git rev-parse origin/main)"
          if [ "$commit_sha" != "$main_sha" ]; then
            echo "targetSha must match the current HEAD of main (${main_sha})" >&2
            exit 1
          fi

          existing_sha="$(git rev-parse -q --verify "refs/tags/${release_tag}^{commit}" || true)"
          if [ -n "$existing_sha" ] && [ "$existing_sha" != "$commit_sha" ]; then
            echo "Tag ${release_tag} already exists at ${existing_sha}. Exact release tags are immutable." >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -z "$existing_sha" ]; then
            git tag "${release_tag}" "${commit_sha}"
          fi
          git tag -f "${minor_tag}" "${commit_sha}"
          git tag -f "${major_tag}" "${commit_sha}"

          if [ -z "$existing_sha" ]; then
            git push origin "refs/tags/${release_tag}"
          fi
          git push --force origin "refs/tags/${minor_tag}" "refs/tags/${major_tag}"

          echo "commit_sha=${commit_sha}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "major_tag=${major_tag}" >> "$GITHUB_OUTPUT"
          echo "minor_tag=${minor_tag}" >> "$GITHUB_OUTPUT"

  build:
    name: Build
    needs: tag-release
    uses: ./.github/workflows/build.yaml
    with:
      mode: release
      ref: ${{ needs.tag-release.outputs.release_tag }}
      release_tag: ${{ needs.tag-release.outputs.release_tag }}

  release:
    name: Create GitHub Release
    needs: [tag-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v8
        with:
          name: release-assets
          path: release-assets

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.tag-release.outputs.release_tag }}
          COMMIT_SHA: ${{ needs.tag-release.outputs.commit_sha }}
        run: |
          gh release create "${RELEASE_TAG}" release-assets/* \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${COMMIT_SHA}" \
            --title "scut ${RELEASE_TAG}" \
            --generate-notes

      - name: Write release summary
        env:
          RELEASE_TAG: ${{ needs.tag-release.outputs.release_tag }}
          COMMIT_SHA: ${{ needs.tag-release.outputs.commit_sha }}
          MAJOR_TAG: ${{ needs.tag-release.outputs.major_tag }}
          MINOR_TAG: ${{ needs.tag-release.outputs.minor_tag }}
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## Release Summary

          | Item | Value |
          |------|-------|
          | Release | \`${RELEASE_TAG}\` |
          | Commit | [\`${COMMIT_SHA:0:7}\`](https://github.com/${{ github.repository }}/commit/${COMMIT_SHA}) |
          | Movable tags | \`${MINOR_TAG}\`, \`${MAJOR_TAG}\` |

          ### Assets

          - \`scut-${RELEASE_TAG}-darwin-amd64.tar.gz\`
          - \`scut-${RELEASE_TAG}-darwin-arm64.tar.gz\`
          - \`scut-${RELEASE_TAG}-linux-amd64.tar.gz\`
          - \`scut-${RELEASE_TAG}-linux-arm64.tar.gz\`
          - \`checksums.txt\`
          EOF

  update-homebrew-tap:
    name: Update Homebrew Tap
    needs: [tag-release, release]
    runs-on: ubuntu-latest
    steps:
      - name: Create release publisher token
        id: release-publisher-token
        uses: actions/create-github-app-token@v3.2.0
        with:
          client-id: ${{ secrets.AJBECK_RELEASE_PUBLISHER_CLIENT_ID }}
          private-key: ${{ secrets.AJBECK_RELEASE_PUBLISHER_KEY }}
          owner: ajbeck
          repositories: homebrew-tap
          permission-actions: write

      - name: Trigger Homebrew tap update
        env:
          GH_TOKEN: ${{ steps.release-publisher-token.outputs.token }}
          RELEASE_TAG: ${{ needs.tag-release.outputs.release_tag }}
        run: |
          gh api repos/ajbeck/homebrew-tap/actions/workflows/update-formula.yml/dispatches \
            --method POST \
            -f ref=main \
            -f inputs[formula]=scut \
            -f inputs[version]="${RELEASE_TAG}"

      - name: Write Homebrew tap summary
        env:
          RELEASE_TAG: ${{ needs.tag-release.outputs.release_tag }}
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## Homebrew Tap

          Triggered \`ajbeck/homebrew-tap\` formula update for \`scut\` ${RELEASE_TAG}.
          EOF

  deploy-docs:
    name: Deploy Docs
    needs: [tag-release, release]
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout release commit
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.tag-release.outputs.commit_sha }}

      - name: Upload docs artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
